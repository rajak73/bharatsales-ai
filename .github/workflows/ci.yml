name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Start MongoDB Replica Set
        run: |
          docker run --name mongodb -d -p 27017:27017 mongo:7.0 mongod --replSet rs0
          sleep 5
          docker exec mongodb mongosh --eval 'rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})'
          sleep 5

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile


      - name: Type Check
        run: pnpm run type-check

      - name: Seed Database
        run: pnpm run --filter @bharatsales/api seed

      - name: Run Unit Tests
        run: pnpm run test

      - name: Build Monorepo (Turbo)
        run: pnpm run build
